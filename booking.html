    Description: Provides the customer booking form and submits booking details asynchronously.
    Functions:
    - updateTimeZone(): Adjusts the minimum selectable pickup time for same-day bookings.
    - submit handler on bookingForm: Sends booking details to booking.php and shows confirmation.
-->
<!DOCTYPE html>
<html>

<head>
    <title>Taxi Booking System</title>
</head>


<body>
    <h1>Welcome to the Taxi Booking System</h1>
    <button onclick="window.location.href='admin.html'">Go to Admin Page</button>
<button onclick="window.location.href='booking.html'">HomePage</button>

    <h1>Booking Page</h1>

    <form action="booking.php" method="post" id="bookingForm">
            <h2>Please fill in your booking details below:</h2>
        <p><label>Enter your name</label></p>
        <input type="text" name="cname" required>
        <p><label>Enter your phone number</label></p>
        <input type="text" name="phone" required>
        <p><label>Enter your unique number</label></p>
        <input type="text" name="unumber">
        <p><label>Enter your street number</label></p>
        <input type="text" name="snumber" required>
        <p><label>Enter your street name</label></p>
        <input type="text" name="sname" required>
        <p><label>Enter your suburb</label></p>
        <input type="text" name="sbname">
        <p><label>Enter your destination suburb</label></p>
        <input type="text" name="dsbname">
        <p><label>Pick-up Date</label></p>
        <input type="date" name="pickup_date" id="pickup_date" required>
        <p><label>Enter pick-up time</label></p>
        <input type="time" name="pickup_time" id="pickup_time" required>
        <p id="pickupError" style="color: red;"></p>
        <p><input type="submit" value="Book Now"></p>
    </form>
    <div id="confirmationMessage"
        style="display:none; margin-top:30px; padding:20px; border:2px solid green; background-color:#e0ffe0;">
        <h2>Thank you for your booking!</h2>
        <p id="reference"></p>
    </div>
    <script>
        const today = new Date();
        const todayStr = today.getFullYear() + '-' +
            String(today.getMonth() + 1).padStart(2, '0') + '-' +
            String(today.getDate()).padStart(2, '0');
        document.getElementById("pickup_date").setAttribute("min", todayStr);
        const pickupDate = document.getElementById("pickup_date");
        const pickupTime = document.getElementById("pickup_time");
        // Adjusts minimum pickup time when the selected pickup date is today.
        function updateTimeZone() {
            if (pickupDate.value === todayStr) {
                const currentTime = String(today.getHours()).padStart(2, '0') + ':' +
                    String(today.getMinutes()).padStart(2, '0');
                pickupTime.setAttribute("min", currentTime);
            }
            else {
                pickupTime.removeAttribute("min");
            }
        }
        pickupDate.addEventListener('change', updateTimeZone);
        // Sends booking data to the server and displays a confirmation on success.
        document.getElementById('bookingForm').addEventListener('submit', function (event) {
            event.preventDefault();
            const formData = new FormData(this);

            fetch('booking.php', {
                method: 'POST',
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('bookingForm').style.display = 'none';
                        document.getElementById('confirmationMessage').style.display = 'block';
                        document.getElementById('reference').innerHTML =
                            '<p>Booking reference number: ' + data.bookingRef + '</p>' +
                            '<p>Pickup Time: ' + data.pickup_time + '</p>' +
                            '<p>Pickup Date: ' + data.pickup_date + '</p>';

                    }
                    else{
                        alert('Booking failed: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('An error occurred while processing your booking. Please try again.');
                });
        })


    </script>
</body>

</html>
