services:
  - type: web
    name: taxibooking-api
    runtime: node
    buildCommand: cd backend/nodejs-api && npm install
    startCommand: cd backend/nodejs-api && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://taxibooking-app.onrender.com

  - type: static
    name: taxibooking-app
    buildCommand: cd frontend/taxi-booking-app && npm install && npm run build
    staticPublishPath: frontend/taxi-booking-app/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://taxibooking-l0t1.onrender.com
